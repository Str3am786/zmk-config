# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable Deep Sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Enable RGB and WS2812 support so the lights CAN work
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

# Enable External Power control so you can cut the battery drain
CONFIG_ZMK_EXT_POWER=y

# --- Display (nice_duck_view) ------------------------------------------------
CONFIG_ZMK_DISPLAY=y
# nice_duck_view's Kconfig.defconfig already selects the custom status screen,
# but we keep it explicit here for clarity.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
# Keep the screen on (don't blank on idle) so you can see the duck.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# --- Caps Lock / HID LED indicators ------------------------------------------
# Lets the central receive Caps/Num/Scroll Lock state from the host.
CONFIG_ZMK_HID_INDICATORS=y

# --- Split: read the peripheral (right) half's battery on the central --------
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Note: WPM is not enabled here. It's central-only (enabling it on the
# peripheral causes a link error), so nice_duck_view's Kconfig.defconfig selects
# CONFIG_ZMK_WPM for the central build only.
