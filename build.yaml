# GitHub Actions build matrix consumed by the ZMK build action.
# Left (central) gets the custom nice_duck_view screen; right (peripheral) keeps
# the stock nice!view widget. `nice_view_adapter` remaps the OLED header pins to
# the SPI bus the nice!view expects.
#
# On ZMK main (hardware-model-v2) the nice!nano v2 board target is
# `nice_nano//zmk` (the bare `nice_nano_v2` is rejected as "Invalid BOARD").
# Use `nice_nano@1.0.0//zmk` instead only if you have a v1.
---
include:
  - board: nice_nano//zmk
    shield: lily58_left nice_view_adapter nice_duck_view
  - board: nice_nano//zmk
    shield: lily58_right nice_view_adapter nice_view
